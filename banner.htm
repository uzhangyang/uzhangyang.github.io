<script language="javascript">
var menu_current=-1;
var urlBasePath="";

function menuOpen(hasUrl,link,id)
{
	if(id=="")
		id=null;

	if(menu_current!=-1)
		document.all(menu_current).className="caidan2";

	if(id==null)
	{
		var ob=window.event.srcElement;
		menu_current=ob.id;
	}
	else
	{
		menu_current=id;
	}

	document.all(menu_current).className="caidan3";

	if(top.contents.document.getElementById("xinxipage").style.display=="block")
		top.contents.showHideMenu();

	if(hasUrl==1)
	{
		top.contents.new_date.loadLeftMenu(menu_current);
	}

	top.contents.new_date.levelStatus=null;
	top.fraContent.cols="148,12,*";
	top.fraConLeft.icon_left.src='image/close_left.gif';
	top.main.location.href=urlBasePath+link;
}

function homepage(vid,url)			//点击有URL的引发
{
	if(vid=="" || vid==null)
		return;
	var objTd=window.event.srcElement;
	var tdText=objTd.innerHTML;
	if(menu_current!=-1 && menu_current!=null)
	{
		document.all(menu_current).className="caidan2";
	}
	menu_current=vid;
	document.all(menu_current).className="caidan3";
	top.contents.new_date.loadMenu();
	if(top.contents.document.getElementById("xinxipage").style.display=="block")
		top.contents.showHideMenu();
	top.location.href=urlBasePath+url;
}
</script>
