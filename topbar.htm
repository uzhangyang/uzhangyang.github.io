<html>

<script language="JavaScript">
function ShowHideTop()
{//隐藏顶部banner和菜单
	if (top.fraTop.rows!="0,11,*,0"){
		top.fraTop.rows="0,11,*,0";
		icon_top.src="image/open_top.gif";
	}else{
		top.fraTop.rows="85,11,*";
		icon_top.src="image/close_top.gif";
	}
}
</script>
<title>New Page 1</title>
</head>

<body onselectstart="return false;">
<table border="0" width="100%" style="border-top: 1 solid #000000" cellspacing="0" cellpadding="0">
    <tr>
      <td width="100%" bgcolor="#A7A7A7" align="center" onclick="ShowHideTop()" style="cursor:hand"><img id="icon_top" title="隐藏或者展开" border="0" src="image/close_top.gif"></td>
      <!--
      <td width="100%" bgcolor="#A7A7A7" align="center"><div onclick="ShowHideTop()" style="cursor:hand"><img id="icon_top" title="隐藏或者展开" border="0" src="image/close_top.gif"></div></td>
      <td onclick="ShowHideLeft()" style="cursor: hand; border-left: 1 solid #000000" bgcolor="#A7A7A7"><img id="icon_left" title="隐藏或者展开菜单" border="0" src="image/close_left.gif"></td>
      -->
    </tr>
</table>
</body>
