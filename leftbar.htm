<%@ page contentType="text/html;charset=gb2312" %>

<html>

<head>
<meta http-equiv="Content-Type" content="text/html; charset=gb2312">
<script language="JavaScript">
function ShowHideLeft()
{//隐藏左边菜单
	if (top.fraContent.cols!="0,12,*")
	{
		top.fraContent.cols="0,12,*";
		icon_left.src="image/open_left.gif";
	}
	else
	{
		top.fraContent.cols="148,12,*";
		icon_left.src="image/close_left.gif";
	}
}
</script>
<title>New Page 1</title>
</head>

<body onselectstart="return false;" style="BORDER-RIGHT: 0px; BORDER-TOP: 0px; MARGIN: 0px; BORDER-LEFT: 0px; BORDER-BOTTOM: 0px">
<table border="0" cellpadding="0" cellspacing="0" style="border-collapse: collapse" height="100%">
  <tr>
    <td onclick="ShowHideLeft()" style="cursor: hand; border-left: 1 solid #000000" bgcolor="#A7A7A7"><img id="icon_left" title="隐藏或者展开菜单" border="0" src="image/close_left.gif"></td>
  </tr>
</table>
</body>

</html>
